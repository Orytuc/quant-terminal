<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Edge OS | Aegis Protocol</title>
    <style>
        /* =========================================
           VARIABILI GLOBALI E COLORI
        ========================================= */
        :root { 
            --bg: #030508; 
            --panel: #0a0e17; 
            --border: #1e293b; 
            --accent: #58a6ff; 
            --accent-glow: rgba(88, 166, 255, 0.4);
            --premium: #bf87ff; 
            --basic: #8b949e;
            --success: #238636; 
            --danger: #da3633; 
            --warn: #d29922;
            --text: #c9d1d9; 
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            --font-mono: "Fira Code", Consolas, monospace;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            overflow: hidden; 
        }
        
        #app-container { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        .view { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            display: none; 
            flex-direction: column; 
            overflow-y: auto; 
            padding-bottom: 30px; 
            animation: slideIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .view.active { 
            display: flex; 
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(20px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        /* =========================================
           SPLASH SCREEN (Aegis Protocol Originale)
        ========================================= */
        #view-splash { 
            justify-content: center; 
            align-items: center; 
            background: #010409; 
            z-index: 9999; 
        }

        .logo-box { 
            text-align: center; 
            animation: float 3s ease-in-out infinite; 
        }

        .logo-icon { 
            font-size: 80px; 
            filter: drop-shadow(0 0 30px var(--accent)); 
            margin-bottom: 10px; 
        }

        .logo-text { 
            font-size: 38px; 
            font-weight: 900; 
            color: #fff; 
            letter-spacing: 6px; 
            margin: 0; 
            text-transform: uppercase; 
        }

        .logo-text span { 
            color: var(--accent); 
        }

        .logo-sub { 
            color: var(--basic); 
            font-size: 11px; 
            letter-spacing: 10px; 
            margin-top: 5px; 
            font-family: var(--font-mono); 
        }

        @keyframes float { 
            0% { transform: translateY(0px); } 
            50% { transform: translateY(-15px); } 
            100% { transform: translateY(0px); } 
        }

        /* =========================================
           HEADER E UI
        ========================================= */
        .header { 
            background: rgba(10, 14, 23, 0.95); 
            backdrop-filter: blur(10px); 
            padding: 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }

        .header h1 { 
            margin: 0; 
            font-size: 18px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .btn-back { 
            background: transparent; 
            color: var(--text); 
            border: 1px solid var(--border); 
            padding: 8px 15px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        
        .content { 
            padding: 20px; 
            flex: 1; 
        }
        
        .card { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .card-title { 
            font-size: 14px; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin: 0 0 15px 0; 
            border-bottom: 1px dashed var(--border); 
            padding-bottom: 10px; 
        }
        
        .input-group { 
            margin-bottom: 15px; 
        }

        label { 
            display: block; 
            font-size: 11px; 
            color: var(--basic); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            font-weight: bold; 
            letter-spacing: 0.5px; 
        }

        input, select, textarea { 
            width: 100%; 
            background: #000; 
            color: #fff; 
            border: 1px solid var(--border); 
            padding: 15px; 
            font-size: 16px; 
            border-radius: 8px; 
            outline: none; 
            font-family: var(--font-mono); 
            font-weight: bold; 
            transition: 0.2s; 
        }

        input:focus, textarea:focus, select:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 10px var(--accent-glow); 
        }

        textarea { 
            min-height: 100px; 
            resize: none; 
            line-height: 1.5; 
        }
        
        .btn { 
            width: 100%; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 18px; 
            font-size: 16px; 
            font-weight: 900; 
            border-radius: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            cursor: pointer; 
            margin-top: 10px; 
            box-shadow: 0 0 15px var(--accent-glow); 
        }

        .btn:active { 
            transform: scale(0.98); 
        }

        /* =========================================
           LOBBY GRID
        ========================================= */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .game-tile { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            padding: 30px 15px; 
            border-radius: 12px; 
            text-align: center; 
            position: relative; 
        }

        .game-tile.locked { 
            opacity: 0.4; 
            filter: grayscale(100%); 
        }

        .g-icon { 
            font-size: 45px; 
            margin-bottom: 15px; 
        }

        .g-name { 
            font-size: 13px; 
            font-weight: 900; 
            text-transform: uppercase; 
        }

        .badge { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            font-size: 9px; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
        }

        .badge.prem { 
            background: var(--premium); 
            color: #000; 
        }

        .badge.base { 
            background: var(--basic); 
            color: #fff; 
        }

        /* =========================================
           STRATEGY & HUD (V10 Engine)
        ========================================= */
        .hud { 
            background: #000; 
            border-radius: 12px; 
            padding: 20px; 
            display: none; 
            margin-top: 20px; 
            border: 1px solid var(--border); 
        }

        .stat-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .stat-box { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
        }

        .stat-box .title { 
            font-size: 10px; 
            color: var(--basic); 
            text-transform: uppercase; 
            margin-bottom: 5px; 
        }

        .stat-box .val { 
            font-size: 20px; 
            font-weight: 900; 
            font-family: var(--font-mono); 
        }
        
        .strategy-box { 
            background: rgba(88, 166, 255, 0.05); 
            border: 2px solid var(--accent); 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center; 
        }

        .strategy-box.danger { 
            border-color: var(--danger); 
            background: rgba(218, 54, 51, 0.05); 
        }

        .strategy-box.success { 
            border-color: var(--success); 
            background: rgba(35, 134, 54, 0.05); 
        }

        .strategy-box .command { 
            font-size: 20px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 1px; 
        }

        .strategy-box .desc { 
            font-size: 13px; 
            line-height: 1.5; 
            color: var(--text); 
        }

        /* =========================================
           MAPPA GENERATA (SQUID GAME)
        ========================================= */
        .path-grid { 
            display: grid; 
            gap: 5px; 
            margin-top: 15px; 
        }

        .path-row { 
            display: grid; 
            gap: 5px; 
            margin-bottom: 5px; 
        }

        .path-step { 
            padding: 15px 5px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 12px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            background: #111; 
            color: #444; 
        }

        .path-step.active { 
            background: var(--accent); 
            color: #000; 
            box-shadow: 0 0 10px var(--accent-glow); 
            border-color: var(--accent); 
        }
    </style>
</head>
<body>

<div id="app-container">

    <div id="view-splash" class="view active">
        <div class="logo-box">
            <div class="logo-icon">🔮</div>
            <h1 class="logo-text">QUANTUM<span>EDGE</span></h1>
            <div class="logo-sub">A E G I S - P R O T O C O L</div>
        </div>
    </div>

    <div id="view-login" class="view">
        <div class="content" style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
            <div style="text-align: center; margin-bottom: 40px;">
                <div style="font-size: 60px; filter: drop-shadow(0 0 20px var(--accent)); margin-bottom: 15px;">🔮</div>
                <h1 style="color: #fff; font-size: 28px; margin: 0; letter-spacing: 3px;">QUANTUM EDGE</h1>
                <p style="font-size: 12px; color: var(--accent); margin-top: 5px; font-family: var(--font-mono);">ENTERPRISE ANALYTICAL CORE</p>
            </div>
            
            <div class="card">
                <label>Master Decryption Key</label>
                <input type="password" id="licenseKey" placeholder="••••••••••••" style="text-align: center; font-size: 14px; letter-spacing: 4px;">
                <button class="btn" onclick="login()">Inizializza Sistema</button>
                <p id="loginErr" style="color: var(--danger); font-size: 12px; text-align: center; display: none; margin-top: 15px; font-weight: bold;">ACCESSO RIFIUTATO</p>
            </div>
        </div>
    </div>

    <div id="view-lobby" class="view">
        <div class="header">
            <h1>MAINFRAME</h1>
            <div id="userBadge" class="badge"></div>
        </div>
        <div class="content">
            <div class="grid" id="gamesContainer"></div>
        </div>
    </div>

    <div id="view-module" class="view">
        <div class="header">
            <h1 id="modTitle">MODULO</h1>
            <button class="btn-back" onclick="naviga('view-lobby')">X CHIUDI</button>
        </div>
        <div class="content">
            <div id="dynamicForm"></div>
            <div id="modHUD" class="hud"></div>
        </div>
    </div>

</div>

<script>
    // =========================================
    // SYSTEM INIT
    // =========================================
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('view-splash').style.opacity = '0';
            setTimeout(() => {
                naviga('view-login');
            }, 300);
        }, 2000);
    };

    // =========================================
    // CONFIG & DATABASE
    // =========================================
    const CODES = { 
        "PREM-BASIC321!": "basic", 
        "PREM-BOSS123!": "premium" 
    };
    
    const GIOCHI = [
        { id: "aviator", nome: "Crash Engine", icon: "✈️", tier: "basic" },
        { id: "squid", nome: "Path Generator", icon: "🌉", tier: "premium" },
        { id: "mines", nome: "Grid Sweeper", icon: "💣", tier: "premium" },
        { id: "plinko", nome: "Plinko Math", icon: "🔺", tier: "basic" }
    ];

    let userTier = null;
    let currentGame = null;

    // =========================================
    // CORE NAVIGATION
    // =========================================
    function naviga(viewId) {
        document.querySelectorAll('.view').forEach(v => {
            v.classList.remove('active');
            v.style.opacity = '1'; // Reset dell'opacità in caso fosse modificata dallo splash
        });
        document.getElementById(viewId).classList.add('active');
    }

    function login() {
        const key = document.getElementById('licenseKey').value.trim();
        
        if (CODES[key]) {
            userTier = CODES[key];
            let badge = document.getElementById('userBadge');
            badge.innerText = userTier === 'premium' ? '👑 PRO' : '👤 BASE';
            badge.className = 'badge ' + (userTier === 'premium' ? 'prem' : 'base');
            costruisciLobby();
            naviga('view-lobby');
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function costruisciLobby() {
        const container = document.getElementById('gamesContainer');
        container.innerHTML = '';
        
        GIOCHI.forEach(g => {
            let locked = (userTier === 'basic' && g.tier === 'premium');
            let btn = document.createElement('div');
            btn.className = `game-tile ${locked ? 'locked' : ''}`;
            btn.innerHTML = `
                <div class="badge ${g.tier === 'premium' ? 'prem' : 'base'}">${g.tier.toUpperCase()}</div>
                <div class="g-icon">${g.icon}</div>
                <div class="g-name">${g.nome}</div>
            `;
            
            btn.onclick = () => {
                if(locked) {
                    alert("Richiede licenza Premium (PREM-BOSS123!).");
                } else {
                    apriModulo(g);
                }
            };
            
            container.appendChild(btn);
        });
    }

    // =========================================
    // COSTRUZIONE MODULI (V10 Engine)
    // =========================================
    function apriModulo(g) {
        currentGame = g.id;
        document.getElementById('modTitle').innerText = g.icon + " " + g.nome;
        document.getElementById('modHUD').style.display = 'none';
        
        const form = document.getElementById('dynamicForm');
        
        if (g.id === 'aviator') {
            form.innerHTML = `
                <div class="card">
                    <h2 class="card-title">Analisi Varianza Crash</h2>
                    <p style="font-size:11px; color:var(--text-muted); margin-top:0;">Incolla i 20/30 voli dello storico. L'algoritmo separerà automaticamente i valori.</p>
                    <textarea id="avHistory" placeholder="Es: 1.10 4.50 1.01 1.20 ..."></textarea>
                    
                    <div class="input-group" style="margin-top:15px;">
                        <label>Target Desiderato (Cashout)</label>
                        <input type="number" step="0.01" id="avTarget" value="2.00">
                    </div>
                    <div class="input-group">
                        <label>Capitale (€)</label>
                        <input type="number" id="avBank" value="100">
                    </div>
                    <button class="btn" onclick="analizzaAviator()">Elabora Segnale</button>
                </div>
            `;
        } else if (g.id === 'squid') {
            form.innerHTML = `
                <div class="card">
                    <h2 class="card-title">Generatore Percorsi (Icefield/Bridge)</h2>
                    <p style="font-size:11px; color:var(--text-muted); margin-top:0;">Seleziona la difficoltà della griglia in cui stai giocando. Il calcolatore ottimizzerà la traccia sicura.</p>
                    
                    <div class="input-group">
                        <label>Livello di Difficoltà</label>
                        <select id="sqDiff">
                            <option value="easy">Facile (3 Lastre, 2 Sicure)</option>
                            <option value="medium" selected>Medio (2 Lastre, 1 Sicura)</option>
                            <option value="hard">Difficile (3 Lastre, 1 Sicura)</option>
                            <option value="extreme">Estremo (4 Lastre, 1 Sicura)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Quanti passi devi fare?</label>
                        <input type="number" id="sqSteps" value="5">
                    </div>
                    <div class="input-group">
                        <label>Capitale a disposizione (€)</label>
                        <input type="number" id="sqBank" value="100">
                    </div>
                    <button class="btn" onclick="analizzaSquid()">Genera Traccia Anti-Tilt</button>
                </div>
            `;
        } else if (g.id === 'mines') {
            form.innerHTML = `
                <div class="card">
                    <h2 class="card-title">Calcolo Rischio Griglia</h2>
                    <div class="input-group"><label>Caselle Totali</label><input type="number" id="mTot" value="25"></div>
                    <div class="input-group"><label>Bombe</label><input type="number" id="mBombs" value="3"></div>
                    <div class="input-group"><label>Obiettivo (Caselle da aprire)</label><input type="number" id="mTgt" value="4"></div>
                    <div class="input-group"><label>Capitale (€)</label><input type="number" id="mBank" value="100"></div>
                    <button class="btn" onclick="analizzaMines()">Calcola Piano Operativo</button>
                </div>
            `;
        } else if (g.id === 'plinko') {
            form.innerHTML = `
                <div class="card">
                    <h2 class="card-title">Probabilità Binomiale</h2>
                    <div class="input-group">
                        <label>Righe (Pins)</label>
                        <select id="pRows">
                            <option value="12">12</option>
                            <option value="14">14</option>
                            <option value="16">16</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Capitale (€)</label>
                        <input type="number" id="pBank" value="100">
                    </div>
                    <button class="btn" onclick="analizzaPlinko()">Calcola Probabilità</button>
                </div>
            `;
        }
        
        naviga('view-module');
    }

    // =========================================
    // LOGICA: AVIATOR (20-30 Voli)
    // =========================================
    function analizzaAviator() {
        let historyStr = document.getElementById('avHistory').value.trim();
        let target = parseFloat(document.getElementById('avTarget').value);
        let bankroll = parseFloat(document.getElementById('avBank').value);
        
        if (!historyStr || isNaN(target) || isNaN(bankroll)) {
            return alert("Compila tutti i campi.");
        }

        // Parsea tutto il testo incollato dividendo per spazi, virgole o a capo
        let voli = historyStr.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
        
        if (voli.length === 0) {
            return alert("Nessun volo numerico rilevato.");
        }

        let rtp = 0.97;
        let probSingola = rtp / target;
        
        // Conta la "Striscia Fredda" guardando la coda dell'array (gli ultimi voli)
        let coldStreak = 0;
        for (let i = voli.length - 1; i >= 0; i--) {
            if (voli[i] < target) {
                coldStreak++;
            } else {
                break;
            }
        }

        // Calcolo limite matematico
        let breakLimit = Math.ceil(Math.log(0.05) / Math.log(1 - probSingola));
        
        let command = "";
        let desc = "";
        let boxClass = "";
        let bet = 0;

        if (coldStreak === 0) {
            command = "ASPETTA (NO BET)";
            desc = `Il target ${target}x è appena uscito. In base ai ${voli.length} voli analizzati, l'RNG è in reset. Rischio di crash basso altissimo.`;
            boxClass = "danger";
            bet = 0;
        } else if (coldStreak >= breakLimit - 1) {
            command = "ENTRA A MERCATO";
            desc = `Rilevata Striscia Fredda di ${coldStreak} voli. L'algoritmo ha saturato la varianza. La pressione statistica per un rimbalzo sopra ${target}x è massima.`;
            boxClass = "success";
            bet = bankroll / 4; // Puntata d'attacco aggressiva
        } else {
            command = "MONITORA (NO BET)";
            desc = `Striscia attuale: ${coldStreak} voli sotto ${target}x. Il limite di rottura calcolato è ${breakLimit}. Attendi altri ${breakLimit - coldStreak} voli a vuoto.`;
            boxClass = "";
            bet = 0;
        }

        renderHUD({
            prob: (probSingola * 100).toFixed(2) + "%",
            bet: bet > 0 ? "€ " + bet.toFixed(2) : "--",
            command: command,
            desc: desc,
            boxClass: boxClass
        });
    }

    // =========================================
    // LOGICA: SQUID GAME / BRIDGE (Mappa Visiva)
    // =========================================
    function analizzaSquid() {
        let diff = document.getElementById('sqDiff').value;
        let steps = parseInt(document.getElementById('sqSteps').value);
        let bankroll = parseFloat(document.getElementById('sqBank').value);
        
        if (steps <= 0 || bankroll <= 0) return;

        let totalOpts = 0;
        let safeOpts = 0;
        
        if (diff === 'easy') { totalOpts = 3; safeOpts = 2; }
        else if (diff === 'medium') { totalOpts = 2; safeOpts = 1; }
        else if (diff === 'hard') { totalOpts = 3; safeOpts = 1; }
        else if (diff === 'extreme') { totalOpts = 4; safeOpts = 1; }

        let probPasso = safeOpts / totalOpts;
        let probWin = Math.pow(probPasso, steps);
        let tentativiMax = Math.ceil(Math.log(0.05) / Math.log(1 - probWin));
        let safeBet = bankroll / tentativiMax;

        // Generazione Griglia Dinamica Visiva
        let pathHTML = `<div class="path-grid">`;
        
        for (let i = 1; i <= steps; i++) {
            pathHTML += `<div class="path-row" style="grid-template-columns: repeat(${totalOpts}, 1fr);">`;
            
            // Genera le caselle sicure in modo randomico
            let safeIndexes = [];
            while(safeIndexes.length < safeOpts) {
                let r = Math.floor(Math.random() * totalOpts);
                if(safeIndexes.indexOf(r) === -1) safeIndexes.push(r);
            }

            for (let j = 0; j < totalOpts; j++) {
                let isActive = safeIndexes.includes(j);
                pathHTML += `<div class="path-step ${isActive ? 'active' : ''}">${isActive ? 'OK' : ''}</div>`;
            }
            pathHTML += `</div>`;
        }
        pathHTML += `</div>`;

        let command = "SEGUI LA TRACCIA";
        let desc = `Difficoltà analizzata. Probabilità totale: ${(probWin*100).toFixed(2)}%. Ti servono fondi per resistere a ${tentativiMax} tentativi. Segui rigorosamente la mappa visiva qui sotto, non farti prendere dal tilt e ritirati al target.<br>${pathHTML}`;

        renderHUD({
            prob: (probWin * 100).toFixed(2) + "%",
            bet: "€ " + safeBet.toFixed(2),
            command: command,
            desc: desc,
            boxClass: "success"
        });
    }

    // =========================================
    // LOGICA: MINES
    // =========================================
    function analizzaMines() {
        let tot = parseInt(document.getElementById('mTot').value);
        let bombs = parseInt(document.getElementById('mBombs').value);
        let tgt = parseInt(document.getElementById('mTgt').value);
        let bankroll = parseFloat(document.getElementById('mBank').value);

        if (tgt + bombs > tot) return;

        let prob = 1; 
        for(let i=0; i<tgt; i++) { 
            prob *= (tot - bombs - i) / (tot - i); 
        }
        
        let limit = Math.ceil(Math.log(0.05) / Math.log(prob === 1 ? 0.99 : 1 - prob));
        let safeBet = bankroll / limit;

        let boxClass = prob > 0.4 ? "success" : "danger";
        let command = prob > 0.4 ? "PIANO APPROVATO" : "RISCHIO ECCESSIVO";
        let desc = prob > 0.4 
            ? "Vantaggio matematico bilanciato. Apri le caselle senza seguire schemi geometrici (zig-zag). Fermati esattamente al target, non essere avido." 
            : `Vuoi aprire troppe caselle. Il rischio di esplosione supera la soglia di guardia. Ritirati al target ${Math.max(1, tgt - 2)} per stabilizzare l'algoritmo.`;

        renderHUD({
            prob: (prob * 100).toFixed(2) + "%",
            bet: "€ " + safeBet.toFixed(2),
            command: command,
            desc: desc,
            boxClass: boxClass
        });
    }

    // =========================================
    // LOGICA: PLINKO
    // =========================================
    function analizzaPlinko() {
        function fact(n) { 
            return n <= 1 ? 1 : n * fact(n-1); 
        }
        function comb(n, k) { 
            return fact(n) / (fact(k) * fact(n-k)); 
        }
        
        let b = parseFloat(document.getElementById('pBank').value);
        let n = parseInt(document.getElementById('pRows').value);
        
        let probEdge = (comb(n, 0) + comb(n, 1) + comb(n, n-1) + comb(n, n)) * Math.pow(0.5, n);
        let bet = b * 0.01; // Gestione conservativa

        renderHUD({
            prob: (probEdge * 100).toFixed(4) + "%",
            bet: "€ " + bet.toFixed(2),
            command: "GESTIONE VARIANZA",
            desc: `Il Triangolo di Pascal concentra il 90% delle palline al centro. Per colpire i lati ti serve un capitale in grado di assorbire ${Math.ceil(1/probEdge)} lanci a vuoto. Usa la bet calcolata per non bruciare il conto.`,
            boxClass: "warn"
        });
    }

    // =========================================
    // RENDER HUD UNIFICATO
    // =========================================
    function renderHUD(data) {
        const hud = document.getElementById('modHUD');
        hud.innerHTML = `
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="title">Probabilità Reale</div>
                    <div class="val">${data.prob}</div>
                </div>
                <div class="stat-box">
                    <div class="title">Bankroll Management</div>
                    <div class="val" style="color:var(--accent);">${data.bet}</div>
                </div>
            </div>
            <div class="strategy-box ${data.boxClass}">
                <div class="command">${data.command}</div>
                <div class="desc">${data.desc}</div>
            </div>
        `;
        hud.style.display = 'block';
        
        // Auto-scroll morbido per i cellulari
        hud.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>

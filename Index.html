<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game - Analisi Sopravvivenza</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #111; color: #eee; margin: 0; padding: 20px; }
        h2 { color: #ff0055; text-align: center; text-transform: uppercase; border-bottom: 2px solid #ff0055; padding-bottom: 10px; }
        .card { background-color: #222; border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #aaa; margin-bottom: 5px; margin-top: 10px; }
        input { width: 100%; background: #000; color: #fff; border: 1px solid #555; padding: 10px; font-size: 16px; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #ff0055; color: white; text-transform: uppercase; }
        button:active { background-color: #cc0044; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #444; padding: 8px; text-align: center; }
        th { background-color: #333; color: #ff0055; }
        .high-risk { color: #ff0055; font-weight: bold; }
        .med-risk { color: #ffaa00; font-weight: bold; }
        .low-risk { color: #00ffaa; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🦑 Calcolatore Percorso</h2>

    <div class="card">
        <label>Passi totali per finire il gioco:</label>
        <input type="number" id="totSteps" value="5" min="1">
        
        <label>Scelte totali a ogni passo (es. 2 mattonelle):</label>
        <input type="number" id="totChoices" value="2" min="2">
        
        <label>Scelte SICURE a ogni passo (es. 1 mattonella buona):</label>
        <input type="number" id="safeChoices" value="1" min="1">

        <button onclick="calcolaSopravvivenza()">Calcola Percorso</button>
    </div>

    <div class="card" id="result-box" style="display: none;">
        <h3 style="margin-top: 0;">Mappa del Rischio:</h3>
        <table id="riskTable">
            <thead>
                <tr>
                    <th>Passo</th>
                    <th>Prob. di arrivarci</th>
                    <th>Rischio Morte</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        <p id="finalVerdict" style="margin-top: 15px; font-size: 14px; text-align: center;"></p>
    </div>

    <script>
        function calcolaSopravvivenza() {
            let steps = parseInt(document.getElementById('totSteps').value);
            let choices = parseInt(document.getElementById('totChoices').value);
            let safe = parseInt(document.getElementById('safeChoices').value);

            if (safe >= choices || steps < 1) {
                alert("Dati non logici. Le scelte sicure devono essere minori di quelle totali.");
                return;
            }

            let probStep = safe / choices;
            let tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            for (let i = 1; i <= steps; i++) {
                let probSurviveTillHere = Math.pow(probStep, i);
                let riskOfDeath = 1 - probSurviveTillHere;

                let row = document.createElement('tr');
                
                // Color formatting based on risk
                let riskClass = "low-risk";
                if (probSurviveTillHere < 0.50) riskClass = "med-risk";
                if (probSurviveTillHere < 0.20) riskClass = "high-risk";

                row.innerHTML = `
                    <td>${i}</td>
                    <td class="${riskClass}">${(probSurviveTillHere * 100).toFixed(2)}%</td>
                    <td>${(riskOfDeath * 100).toFixed(2)}%</td>
                `;
                tbody.appendChild(row);
            }

            let probFinale = Math.pow(probStep, steps) * 100;
            let verdict = document.getElementById('finalVerdict');
            verdict.innerHTML = `Probabilità matematica di completare l'intero gioco: <strong class="high-risk">${probFinale.toFixed(4)}%</strong>. <br><br><em>Consiglio: Se la percentuale scende sotto il 50%, incassare è la scelta matematica corretta.</em>`;

            document.getElementById('result-box').style.display = "block";
        }
    </script>
</body>
</html>
